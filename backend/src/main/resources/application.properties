spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:taskmanager-super-secret-key-2024-minimum-256-bits-long}
jwt.expiration=86400000

server.port=${PORT:8080}

spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
